site_name: 海星笔记
theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
  language: zh
  icon:
    repo: fontawesome/brands/git-alt
  font:
    code: JetBrains Mono
    text: JetBrains Mono
  features:
    # - navigation.tabs # 平铺导航栏
    - navigation.tabs.sticky # 导航栏固定
    - header.autohide # 自动隐藏标题栏
    - navigation.footer # 页脚
    - navigation.instant # 即时加载, 本网站 url 变化时自动加载
    - navigation.tracking # 导航栏追踪锚点
    - navigation.path # 显示路径
    - search.suggest # 搜索建议
    - search.highlight # 搜索结果高亮
    - content.code.copy # 代码块复制

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hxaxd/

repo_url: https://github.com/hxaxd/hxlog
repo_name: 海星笔记

markdown_extensions:
  - pymdownx.arithmatex:
      # 数学
      generic: true
  - pymdownx.highlight:
      # 高亮依赖
      anchor_linenums: true
  - pymdownx.superfences # 高亮
  - pymdownx.inlinehilite # 高亮增强
  - admonition # 提示框
  - pymdownx.details # 可折叠提示框

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0.17.0/dist/katex.min.js
  - https://unpkg.com/katex@0.17.0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0.17.0/dist/katex.min.css
